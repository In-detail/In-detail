<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IN-DETAIL | Mobilní čištění interiérů firemních vozidel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM & PROMĚNNÉ --- */
        :root {
            --primary-black: #111111;
            --secondary-graphite: #262626;
            --accent-gold: #B89B5E;
            --accent-gold-hover: #cfb172;
            --bg-light: #F7F7F5;
            --text-dark: #3A3A3A;
            --text-light: #FFFFFF;
            --text-muted: #A0A0A0;
            --font-headings: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Manrope', sans-serif;
            --transition-smooth: all 0.3s ease;
        }

        /* --- ZÁKLADNÍ RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
            overflow-x: hidden;
            padding-top: 90px; /* Kompenzace pro fixní menu */
        }

        h1, h2, h3, h4 {
            font-family: var(--font-headings);
            font-weight: 600;
            color: var(--primary-black);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- TLAČÍTKA --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-gold);
            color: var(--primary-black);
        }

        .btn-primary:hover {
            background-color: var(--accent-gold-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--text-light);
        }

        .btn-secondary:hover {
            background-color: var(--text-light);
            color: var(--primary-black);
            transform: translateY(-2px);
        }

        /* --- HLAVIČKA (STICKY HEADER & NAV) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(184, 155, 94, 0.2);
            padding: 20px 0;
            transition: var(--transition-smooth);
        }

        /* Třída přidaná pomocí JS při odscrolování */
        header.scrolled {
            padding: 12px 0;
            background-color: rgba(11, 11, 11, 0.98);
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-placeholder .logo-id {
            font-family: var(--font-headings);
            font-size: 28px;
            font-weight: bold;
            color: var(--text-light);
            border-right: 1px solid var(--accent-gold);
            padding-right: 10px;
        }

        .logo-placeholder .logo-id span {
            color: var(--accent-gold);
        }

        .logo-placeholder .logo-text {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            line-height: 1.2;
        }

        nav ul {
            display: flex;
            gap: 25px;
        }

        nav ul a {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        nav ul a:hover, nav ul a.active {
            color: var(--accent-gold);
        }

        /* Okamžitý telefonní kontakt v hlavičce */
        .nav-contact {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .nav-contact .phone-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .nav-contact .phone-number {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 18px;
            color: var(--text-light);
        }

        .nav-contact .phone-number:hover {
            color: var(--accent-gold);
        }

        /* --- HERO SEKCE --- */
        .hero {
            padding: 100px 0;
            background-color: var(--primary-black);
            color: var(--text-light);
            text-align: center;
            position: relative;
            background-image: linear-gradient(rgba(17, 17, 17, 0.8), rgba(17, 17, 17, 0.95)), url('https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            min-height: calc(100vh - 90px);
        }

        .hero h1 {
            color: var(--text-light);
            font-size: 64px;
            line-height: 1.1;
            margin-bottom: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
